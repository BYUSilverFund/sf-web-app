name: Pull Request Tests

# Trigger this workflow on pull requests to prod and dev branches,
# and on pushes to the testing branch for validation
on:
  pull_request:
    branches:
      - prod
      - dev
  push:
    branches:
      - testing

# Define the jobs to run
jobs:
  test:
    # Run on the latest Ubuntu environment
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Node.js environment
      # Using Node.js 22.x as specified in package.json engines
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # Step 3: Install project dependencies
      # Uses npm ci for clean, reproducible installs based on package-lock.json
      - name: Install dependencies
        run: npm ci

      # Step 4: Run linter to check code quality
      # This will fail the workflow if linting errors are found
      - name: Run linter
        run: npm run lint

      # Step 5: Run production build
      # This ensures the code builds successfully and catches TypeScript errors
      # Build failures will fail the workflow
      - name: Build project
        run: npm run build
