version: 1
env:
  variables:
    NEXT_PUBLIC_FASTAPI_URL: ${FASTAPI_URL}
    NEXT_PUBLIC_COGNITO_REGION: ${COGNITO_REGION}
    NEXT_PUBLIC_COGNITO_USER_POOL_ID: ${COGNITO_USER_POOL_ID}
    NEXT_PUBLIC_COGNITO_APP_CLIENT_ID: ${COGNITO_APP_CLIENT_ID}

frontend:
  phases:
    preBuild:
      commands:
        - npm install
    build:
      commands:
        # Debug: show which branch and values are being used
        - echo "Building branch $AWS_BRANCH"
        - echo "FASTAPI_URL=$FASTAPI_URL"
        - echo "COGNITO_APP_CLIENT_ID=$COGNITO_APP_CLIENT_ID"

        # Write environment variables to .env.production
        - echo "NEXT_PUBLIC_FASTAPI_URL=$FASTAPI_URL" >> .env.production
        - echo "NEXT_PUBLIC_COGNITO_REGION=$COGNITO_REGION" >> .env.production
        - echo "NEXT_PUBLIC_COGNITO_USER_POOL_ID=$COGNITO_USER_POOL_ID" >> .env.production
        - echo "NEXT_PUBLIC_COGNITO_APP_CLIENT_ID=$COGNITO_APP_CLIENT_ID" >> .env.production

        # Verify what was written
        - cat .env.production
        - npm run build
  artifacts:
    baseDirectory: .next/
    files:
      - "/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
