version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install
    build:
      commands:
        - echo "NEXT_PUBLIC_FASTAPI_URL=$FASTAPI_URL" >> .env.production
        - echo "NEXT_PUBLIC_COGNITO_REGION=$COGNITO_REGION" >> .env.production
        - echo "NEXT_PUBLIC_COGNITO_USER_POOL_ID=$COGNITO_USER_POOL_ID" >> .env.production
        - echo "NEXT_PUBLIC_COGNITO_APP_CLIENT_ID=$COGNITO_APP_CLIENT_ID" >> .env.production
        - echo "NEXT_PUBLIC_GRAPHQL_ENDPOINT=$GRAPHQL_ENDPOINT" >> .env.production
        - echo "NEXT_PUBLIC_GRAPHQL_API_KEY=$GRAPHQL_API_KEY" >> .env.production
        - npm run build
  artifacts:
    baseDirectory: .next/
    files:
      - "/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
